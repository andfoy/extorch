name: Linux build

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    linux:
        name: Linux OTP${{ matrix.OTP_VERSION }} / Elixir ${{ matrix.ELIXIR_VERSION }} (${{ matrix.PYTORCH_VERSION }} - ${{ matrix.DEVICE }})
        runs-on: ubuntu-latest
        env:
            OTP_VERSION: ${{ matrix.OTP_VERSION }}
            ELIXIR_VERSION: ${{ matrix.ELIXIR_VERSION }}
            PYTORCH_VERSION: ${{ matrix.PYTORCH_VERSION }}
            DEVICE: ${{ matrix.DEVICE }}
            RUNNER_OS: "ubuntu"
        strategy:
            fail-fast: false
            matrix:
                PYTORCH_VERSION: ['2.11.0', 'latest']
                OTP_VERSION: ['27', '26']
                ELIXIR_VERSION: ['1.18', '1.17']
                DEVICE: ['cpu']
        steps:
            - name: Checkout branch
              uses: actions/checkout@v4
            - name: Install latest Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                components: rustfmt, clippy
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
            - name: Cache pip packages
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: pip-torch-cpu-${{ runner.os }}
            - name: Print Rust version
              shell: bash -l {0}
              run: rustc --version
            - name: Install OTP and Elixir
              uses: erlef/setup-beam@v1
              with:
                otp-version: ${{ matrix.OTP_VERSION }}
                elixir-version: ${{ matrix.ELIXIR_VERSION }}
            - name: Download libtorch binaries
              shell: bash -l {0}
              run: bash -l .github/scripts/download_torch.sh
            - name: Install dependencies
              shell: bash -l {0}
              run: mix deps.get
            - name: Build and test extorch
              shell: bash -l {0}
              run: bash -l .github/scripts/test_extorch.sh
